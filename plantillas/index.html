</h1> <div class="cards-search"> <input id="search" placeholder="Buscar plantilla..."> </div> <p class="mt-2 text-sm">
Resultados: <span id="count">0</span> </p> <div class="table-container"> <table class="table"> <thead> <tr> <th>Aplicativo</th> <th>Solicitud</th> <th>Servicio</th> <th>Resumen</th> <th>Cierre</th> </tr> </thead> <tbody id="body"></tbody> </table> </div> </section> <script>

const body = document.getElementById("body");
const count = document.getElementById("count");
const search = document.getElementById("search");

let data = [];
let filteredData = [];
let page = 1;
const pageSize = 680;

function normalize(text = ""){
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"") 
    .replace(/[^\w\s]/g,"") 
    .replace(/\s+/g," ") 
    .trim();
}

function highlight(text = "", query = ""){

  if(!query) return text;
  const words = query.split(" ").filter(w => w.length > 1);
  let result = text;
  words.forEach(word => {
    const regex = new RegExp(`(${word})`, "gi");
    result = result.replace(regex, `<mark>$1</mark>`);
  });
  return result;
}

async function load(){
  const res = await fetch("/plantillas-system/api/plantillas");
  data = await res.json();
  filteredData = data;
  render();

}

function render(){
  count.textContent = filteredData.length;
  const start = (page - 1) * pageSize;
  const end = start + pageSize;
  const pageData = filteredData.slice(start, end);
  const q = search.value;
  body.innerHTML = pageData.map(p => `

<tr>
  <td>${highlight(p.aplicativo ?? "", q)}</td>
  <td>${highlight(p.solicitud ?? "", q)}</td>
  <td>${highlight(p.servicio ?? "", q)}</td>
  <td>${highlight(p.resumen ?? "", q)}</td>
  <td>${highlight(p.cierre ?? "", q)}</td>
</tr>

  `).join("");

}

search.addEventListener("input", () => {
  const q = normalize(search.value.trim());
  page = 1;
  filteredData = data.filter(p => {
    const fullText = normalize(`
      ${p.aplicativo || ""}
      ${p.solicitud || ""}
      ${p.servicio || ""}
      ${p.resumen || ""}
      ${p.cierre || ""}
    `);
    return fullText.includes(q);
  });
  render();

});

function nextPage(){
  if(page * pageSize < filteredData.length){
    page++;
    render();
  }
}
function prevPage(){
  if(page > 1){
    page--;
    render();
  }
}

load();

</script>  </main> </div>
